    <script type="text/javascript" charset="utf-8">
        $(document).ready(function() {
            namespace = '/test';
            
            var player_list = [];
            var status = "deactiv_buttons";
            var currentTime = Date.now();
            var question_audio = document.getElementById('question_audio');
            var question_audio_src = document.getElementById('question_audio_src');
            var question_video = document.getElementById('question_video');
            var question_video_src = document.getElementById('question_video_src');
            document.cookie = "question_audio_current_time=0";
            question_video.addEventListener("ended", function(){
                console.log('video completed');
                question_video.setAttribute('data-icon','');
            }); 

            var socket = io.connect(location.protocol + '//' + document.domain + ':' + location.port + namespace);

            // ==========================================
            // LOGIQUE GAMEPAD INTEGREE
            // ==========================================
            var ancienneConfigurationBoutons = {};

            function scruterManettes() {
                var manettes = navigator.getGamepads ? navigator.getGamepads() : [];
                for (var i = 0; i < manettes.length; i++) {
                    var manette = manettes[i];
                    if (manette) {
                        if (!ancienneConfigurationBoutons[manette.index]) {
                            ancienneConfigurationBoutons[manette.index] = [];
                        }
                        for (var b = 0; b < manette.buttons.length; b++) {
                            var bouton = manette.buttons[b];
                            var estPresse = (typeof(bouton) === "object") ? bouton.pressed : (bouton === 1.0);
                            var etaitPresse = ancienneConfigurationBoutons[manette.index][b] || false;
                            
                            if (estPresse && !etaitPresse) {
                                console.log("Game Status " + status + " Manette " + manette.index + " (" + manette.id + ") : Bouton " + b + " pressé !");
                                if ( status == "deactiv_buttons" ) {
                                    socket.emit('gamepad_press', {
                                        gamepad_index: manette.index,
                                        gamepad_id: manette.id,
                                        button_index: b
                                    });
                                }
                                else if ( status == "set_questions" ) {
                                    var timeElapsed = ((Date.now() - currentTime) / 1000).toFixed(3);
                                    socket.emit('gamepad_press_button', {
                                        gamepad_index: manette.index,
                                        gamepad_id: manette.id,
                                        button_index: b,
                                        time: timeElapsed
                                    });
                                }
                            }
                            ancienneConfigurationBoutons[manette.index][b] = estPresse;
                        }
                    }
                }
                requestAnimationFrame(scruterManettes);
            }

            window.addEventListener("gamepadconnected", function(e) {
                console.log("Manette connectée à l'index %d : %s. %d boutons.", 
                    e.gamepad.index, e.gamepad.id, e.gamepad.buttons.length);
            });

            requestAnimationFrame(scruterManettes);

            // ==========================================
            // LOGIQUE DE RECEPTION ET EMISSION DES BUZZERS
            // ==========================================
            socket.on('add_buzz_player', function(msg) {
                console.log("Événement add_buzz_player reçu du serveur.");
                if (msg && msg.buzz_nb) {
                    $('#buzz_player_' + msg.buzz_nb + '_div').show();
                    
                    var $led = $('#buzz_player_' + msg.buzz_nb + '_led');
                    
                    // Désactive et force le redémarrage de l'animation à chaque appui
                    $led.removeClass('led-on');
                    $led[0].offsetHeight; // Astuce magique pour forcer un reflow CSS
                    $led.addClass('led-on');
                }
            });

            for (let i = 1; i <= 4; i++) {
                $(`#buzz_player_${i}_btn`).click(function(e) {
                    e.preventDefault();
                    var nomBuzzer = $(`#buzz_player_${i}_name`).val();
                    var generation_element = document.getElementById("buzz_player_"+i+"_generation_select");
                    var generation_select_idx = generation_element.selectedIndex;
                    var generation_select_value = generation_element.options[generation_select_idx].value;
                    
                    if (generation_select_value == "") {
                        alert("Sélectionnez votre génération !");
                        return false;
                    }
                    
                    console.log("Envoi du buzzer " + i + " avec le nom: " + nomBuzzer);
                    socket.emit('add_buzz_player', {
                        buzz_nb: i,
                        name: nomBuzzer,
                        generation: generation_select_value
                    });
                });
            }
            // ==========================================

            socket.on('my_response', function(msg) {
                $('#log').append('<br>' + $('<div/>').text('Received #' + msg.count + ': ' + msg.name + ' push ' + msg.data + ' in ' + msg.time + ' seconds').html());
                if ('name' in msg) {
                    if ( status == "get_players" ) {
                      row = '<tr><td class="fname">'+msg.name+'</td><td class="lname">'+msg.data+'</td></tr>';
                      $('.connected_players table > tbody').append(row);
                    }
                    else {
                      var index_to_splice = -1;
                      var rows;
                      $('.players table > tbody').empty();
                      player_list.forEach(function(item, index, array) {
                          if (item.name == msg.name) {
                              index_to_splice = index;
                          }
                      });
                      if (index_to_splice == -1) {
                          player_list.push(msg);
                      } else {
                          player_list.splice(index_to_splice, 1, msg);
                      }
                      player_list.forEach(function(item, index, array) {
                          rows += '<tr><td class="fname">'+item.name+'</td><td class="lname">'+item.data+'</td><td>'+item.time+'</td></tr>';
                      });
                      $('.players table > tbody').append(rows);
                  }
                }
            });
            
            socket.on('add_player', function(msg) {
                var button = document.getElementById("del_player_"+msg.number+"_button");
                button.innerHTML='Sup. ' + msg.name;
                button.style.display = 'inline-block';
                button.style.visibility = "visible";
                updateLeaderboard(msg.leaderboard_update);
            });
            
            socket.on('del_player', function(msg) {
                const tbody = document.getElementById('leaderboard_body');
                let row = tbody.querySelector(`tr[data-id="${msg.name}"]`);
                if (row) {
                    row.remove();
                }
                updateLeaderboard(msg.leaderboard_update);
            });
            
            socket.on('add_players_console', function(msg) {
                var players_console = document.getElementById("players_console");
                if (msg.time == "0") {
                    console.log("receveive add_players_console with comment:" + msg.comment + " media_type:(" + msg.media_type + ") media:(" + msg.media + ") and players:" + msg.players);
                    showPlayerBoutonsForm()
                    hideAllDelPlayerButtons()
                    for ( i = 0; i < msg.players.length; i++ ) {
                        var button = document.getElementById("del_player_"+(i+1)+"_button");
                        button.innerHTML='Sup. ' + msg.players[i];
                        button.style.display = 'block';
                        button.style.visibility = "visible";
                    }
                    console.log("log to players_console " + msg.name + " " + msg.comment);
                    players_console.innerHTML = players_console.innerHTML + "<br />" + msg.name + " " + msg.comment;
                    console.log("rename labels and borders");
                    renameLabel('question', 'PRET A JOUER ?');
                    renameLabel('reponse1', "&nbsp;");
                    recolorBorder('reponse1', 'white')
                    renameLabel('reponse2', "&nbsp;");
                    recolorBorder('reponse2', 'white')
                    renameLabel('reponse3', "&nbsp;");
                    recolorBorder('reponse3', 'white')
                    renameLabel('reponse4', "&nbsp;");
                    recolorBorder('reponse4', 'white')
                    
                    // On éteint toutes les LED à la réinitialisation
                    $('.led-indicator').removeClass('led-on');

                    console.log("empty question image");
                    document.getElementById('question_image').setAttribute("src", "");
                    if ( msg.media_type == "image" ) {
                        document.getElementById("question_image").style.display = 'inline-block';
                        document.getElementById('question_image').setAttribute("src", msg.media);
                    }
                    console.log("empty audio");
                    question_audio.pause();
                    question_audio.currentTime = 0;
                    question_audio_src.src = "";
                    question_audio.currentTime = 0;
                    if ( msg.sound != "" ) {
                        question_audio_src.src = msg.sound;
                        question_audio.load();
                        question_audio.play();
                    }
                    console.log("empty video");
                    question_video.pause();
                    question_video.currentTime = 0;
                    question_video_src.src = "";
                    question_video.pause();
                    question_video.currentTime = 0;
                    if ( msg.media_type == "video" ) {
                        question_video_src.src = msg.media;
                        if ( msg.media != "" ) {
                            question_video.load();
                            question_video.play();
                        }
                    }
                }
                else {
                    console.log("receveive add_players_console with player:" + msg.name + " who played in " + msg.time + " seconds");
                    players_console.innerHTML = players_console.innerHTML + "<br />" + msg.name + " played in " + msg.time + " seconds";
                }
            });
            
            socket.on('update_players', function(msg) {
                updateLeaderboard(msg.leaderboard_update);
            });
            
            socket.on('display_topic', function(msg) {
                document.getElementById("players_console").innerHTML = "";
                console.log("receveive " + msg.action + " " + msg.question + " sound:(" + msg.sound + ") media_type:(" + msg.media_type + ") media:(" + msg.media + ")");
                console.log("with blue button 2:" + msg.b2 + " orange button 3:" + msg.b3 + " green button 4:" + msg.b4 + " yellow button 5:" + msg.b5);
                hideMenuBoutonsForm()
                hidePlayerBoutonsForm()
                $('#defaultCountdown').countdown('destroy');
                $('#defaultCountdown').countdown({until: msg.timeout, format: 'S'});
                renameLabel('question', msg.question);
                renameLabel('reponse1', msg.b2);
                var border_color = (msg.b2 === "&nbsp;") ? 'white' : 'blue';
                if ( msg.answer) {
                    border_color = "lightgrey";
                    if (msg.answer == "bouton2") {
                        border_color = "blue";
                    }
                }
                recolorBorder('reponse1', border_color)
                renameLabel('reponse2', msg.b3);
                var border_color = (msg.b3 === "&nbsp;") ? 'white' : 'orange';
                if ( msg.answer) {
                    border_color = "lightgrey";
                    if (msg.answer == "bouton3") {
                        border_color = "orange";
                    }
                }
                recolorBorder('reponse2', border_color)
                renameLabel('reponse3', msg.b4);
                var border_color = (msg.b4 === "&nbsp;") ? 'white' : 'green';
                if ( msg.answer) {
                    border_color = "lightgrey";
                    if (msg.answer == "bouton4") {
                        border_color = "green";
                    }
                }
                recolorBorder('reponse3', border_color)
                renameLabel('reponse4', msg.b5);
                var border_color = (msg.b5 === "&nbsp;") ? 'white' : 'yellow';
                if ( msg.answer) {
                    border_color = "lightgrey";
                    if (msg.answer == "bouton5") {
                        border_color = "yellow";
                    }
                }
                recolorBorder('reponse4', border_color)
                document.getElementById('question_image').setAttribute("src", "");
                if ( msg.media_type == "image" ) {
                    document.getElementById("question_image").style.display = 'inline-block';
                    document.getElementById('question_image').setAttribute("src", msg.media);
                }
                
                question_audio.pause();
                question_audio.currentTime = 0;
                question_audio_src.src = "";
                question_audio.currentTime = 0;
                if ( msg.sound != "" ) {
                    question_audio_src.src = msg.sound;
                    question_audio.load();
                    question_audio.play();
                }
                
                question_video.pause();
                question_video.currentTime = 0;
                question_video_src.src = "";
                question_video.pause();
                question_video.currentTime = 0;
                if ( msg.media_type == "video" ) {
                    question_video_src.src = msg.media;
                    if ( msg.media != "" ) {
                        question_video.load();
                        question_video.play();
                    }
                }
                player.stopVideo();
            });

            socket.on('player_choose_category', function(msg) {
                var players_console = document.getElementById("players_console");
                console.log("receveive player_choose_category for player name:" + msg.name);
                players_console.innerHTML = players_console.innerHTML + "<br />" + msg.name + " choose a topic";
            });
            
            socket.on('display_question', function(msg) {
                console.log("receveive " + msg.action + " with topic:" + msg.topic + " question:" + msg.question + " sound:(" + msg.sound + ") media_type:(" + msg.media_type + ") media:(" + msg.media + ") timeout:(" + msg.timeout + ")");
                hideMenuBoutonsForm()
                hidePlayerBoutonsForm()
                $('#defaultCountdown').countdown('destroy');
                $('#defaultCountdown').countdown({until: msg.timeout, format: 'S'});
                document.getElementById("topic").innerHTML = "Question " + msg.topic;
                renameLabel('question', msg.question);
                renameLabel('reponse1', msg.b2);
                var border_color = (msg.b2 === "&nbsp;") ? 'white' : 'blue';
                recolorBorder('reponse1', border_color)
                renameLabel('reponse2', msg.b3);
                var border_color = (msg.b3 === "&nbsp;") ? 'white' : 'orange';
                recolorBorder('reponse2', border_color)
                renameLabel('reponse3', msg.b4);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '480',
                width: '640',
                videoId: document.getElementById("youtube_link").value,
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
            player.PlayerState = YT.PlayerState.ENDED;
        }
        function onPlayerReady(event) {
            event.target.playVideo();
        }
        var done = false;
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING && !done) {
                done = true;
            }
        }
        
        // Updated to use local browser compiler rendering instead of api.qrserver.com
        function UpdateQRCode(){
            var targetUrl = location.protocol + '//' + location.host + '/web_quizz_login';
            var container = document.getElementById("qrcode");
            
            // Wipe out old canvases/images before drawing a clean one
            container.innerHTML = ""; 
            
            new QRCode(container, {
                text: targetUrl,
                width: 250,
                height: 250,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.M
            });
        }

                const id = row.dataset.id;

            });

                }

                const progClass = player.progression > 0 ? 'up' : (player.progression < 0 ? 'down' : 'stable');
                const progIcon = player.progression > 0 ? '▲' : (player.progression < 0 ? '▼' : '▬');
                const progValue = player.progression === 0 ? '0' : Math.abs(player.progression);

                row.innerHTML = `
                    <td class="rank">${player.rank}</td>
                    <td class="player">
                        <div class="player-img"></div>
                        <span>${player.name}</span>
                    </td>
                    <td>${player.points.toLocaleString()} pts</td>
                    <td>${player.play_time || 0} s</td>
                    <td class="progression ${progClass}">
                        <span class="icon">${progIcon}</span> ${progValue}
                    </td>
                `;

                tbody.appendChild(row);
            });

            Array.from(tbody.rows).forEach(row => {
                const id = row.dataset.id;
                const oldTop = rowPositions[id];
                
                if (oldTop) {
                    const newTop = row.getBoundingClientRect().top;
                    const delta = oldTop - newTop;

                    if (delta !== 0) {
                        row.style.transition = 'none';
                        row.style.transform = `translateY(${delta}px)`;

                        requestAnimationFrame(() => {
                            row.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                            row.style.transform = 'translateY(0)';
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
