                var playlist_database_elem = document.getElementById("playlist_database_select");
                var playlist_database_idx = playlist_database_elem.selectedIndex;

                        return false;

                    question_value = document.getElementById("youtube_link").value;
                    video_current_time = 0.0;
                    socket.emit('new_question', {topic: "suite", format: question_type, value: nb_random_yt_id_input, db: playlist_database_value, is_players_report_presence: is_players_report_presence});
                    return false;
                }
                if ( val == 0 ) {
                    alert("Choisir une réponse attendue");
                    return false;
                }

                        return false;
                    }

                console.log("good_answer_audio finished");
                var question_audio = document.getElementById('question_audio');
                var question_audio_src = document.getElementById('question_audio_src');
                let question_audio_current_time;
                const name = "question_audio_current_time=";
                const cDecoded = decodeURIComponent(document.cookie); //to be careful
                const cArr = cDecoded .split('; ');
                // let res;
                cArr.forEach(val => {
                    if (val.indexOf(name) === 0) question_audio_current_time = val.substring(name.length);
                })
                console.log("question_audio_current_time is " + question_audio_current_time);
                question_audio.load();
                question_audio.currentTime = parseFloat(question_audio_current_time);
                question_audio.play();
            }
        }
