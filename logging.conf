[loggers]
keys=root,app, buzzerapp, game, suite

[handlers]
keys=consoleHandler,fileHandler,rotatingFileHandler

[formatters]
keys=simpleFormatter,logfileformatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_app]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=app
propagate=0

[logger_buzzerapp]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=buzzerapp
propagate=0

[logger_game]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=game
propagate=0

[logger_suite]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=suite
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=NOTSET
args=('app.log','w', 'utf-8')
formatter=logfileformatter

[handler_rotatingFileHandler]
class=handlers.RotatingFileHandler
level=NOTSET
args=('log/app.log','a',2000,100)
formatter=logfileformatter

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=

[formatter_logfileformatter]
format=%(asctime)s %(name)-12s: %(levelname)s %(message)s
